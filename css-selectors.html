<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="stylesheet" href="css/conteudo.css" />
    <title>CSS Seletores - Semana 06</title>
    <style>
      .demo {
        border: 1px solid #ccc;
        background: #f2f2f2;
        padding: 14px;
        border-radius: 4px;
      }

      #badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 4px;
        background: #fff;
        border: 1px solid #ccc;
      }

      .demo a {
        color: #0000ee;
      }

      .demo a:hover {
        border-bottom-style: solid;
      }

      .demo a:visited {
        color: #6d28d9;
      }

      .pill::before {
        content: "CSS";
        margin-right: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 8px 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background: #fff;
      }

      input[type="text"].input-demo:focus {
        outline: 2px solid #999;
      }
    </style>
  </head>
  <body id="top">
    <header>
      <object width="100%" height="84px" data="menu.html"></object>
      <img id="logo-topo" src="ifsp.png" alt="Instituto Federal São Paulo" />
    </header>

    <main id="conteudo">
      <section>
        <h1>Seletores, pseudo-classes e pseudo-elementos</h1>
        <p>
          Aqui você encontra exemplos simples de <strong>classe</strong>,
          <strong>id</strong>, <strong>seletor descendente</strong>,
          <strong>pseudo-classes</strong> e <strong>pseudo-elementos</strong>.
        </p>

        <div class="demo">
          <p>
            Exemplo de <code>#id</code>:
            <span id="badge">badge</span>
          </p>

          <p>
            Exemplo de <code>.classe</code> + <code>::before</code>:
            <span class="pill">pílula</span>
          </p>

          <p>
            Exemplo de pseudo-classes em links:
            <a href="index.html#biblioteca">visitar biblioteca</a>
            (teste <code>:hover</code> e <code>:visited</code>).
          </p>

          <label for="i">Exemplo de <code>:focus</code>:</label>
          <input
            id="i"
            type="text"
            class="input-demo"
            placeholder="Clique aqui e veja o foco"
          />
        </div>
      </section>
    </main>

    <footer>
      <a class="toTop" href="#top" aria-label="Voltar ao topo">
        <img src="MoveTop.png" alt="" class="toTop__img" />
      </a>
      <object width="100%" height="120px" data="rodape.html"></object>
    </footer>
  </body>
</html>
