<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="stylesheet" href="css/conteudo.css" />
    <link rel="stylesheet" href="css/formularios.css" />
    <title>Eventos - IFSP - Pirituba</title>
  </head>
  <body id="top">
    <header>
      <object width="100%" height="84px" data="menu.html"></object>
      <img id="logo-topo" src="ifsp.png" alt="Instituto Federal São Paulo" />
    </header>

    <main id="conteudo">
      <section>
        <h1>Inscreva-se</h1>

        <form class="form-card" action="#" method="post">
          <h2>Evento</h2>
          <label for="evento">Selecione</label>
          <select id="evento" name="evento" required>
            <option value="" selected>-- Selecione --</option>
            <option value="voe_sem_asas">Voe sem asas</option>
            <option value="festa_junina">Festa junina</option>
            <option value="semana_tecnologia">Semana de tecnologia</option>
          </select>

          <h2>Informações de Acesso</h2>
          <label for="user">Usuário</label>
          <input id="user" name="user" type="text" required />

          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" required />

          <label for="senha2">Confirme a Senha</label>
          <input id="senha2" name="senha2" type="password" required />

          <h2>Informações Pessoais</h2>
          <label for="nome">Nome Completo</label>
          <input id="nome" name="nome" type="text" required />

          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required />

          <label for="cel">Celular (99) 99999-9999</label>
          <input id="cel" name="cel" type="tel" placeholder="(99) 99999-9999" />

          <div style="margin-top: 10px">Sexo</div>
          <label>
            <input type="radio" name="sexo" value="masculino" />
            Masculino
          </label>
          <label style="margin-left: 12px">
            <input type="radio" name="sexo" value="feminino" />
            Feminino
          </label>

          <label for="nasc" style="margin-top: 10px; display: block"
            >Data de Nascimento</label
          >
          <input id="nasc" name="nasc" type="text" placeholder="dd/mm/aaaa" />

          <label for="cor">Cor Favorita</label>
          <input id="cor" name="cor" type="text" placeholder="Ex.: verde" />

          <label for="gh">Perfil no Github</label>
          <input id="gh" name="gh" type="url" placeholder="https://github.com/..." />

          <input type="submit" value="Inscrever" />
          <input type="reset" value="Limpar" />
        </form>
      </section>
    </main>

    <footer>
      <a class="toTop" href="#top" aria-label="Voltar ao topo">
        <img src="MoveTop.png" alt="" class="toTop__img" />
      </a>
      <object width="100%" height="120px" data="rodape.html"></object>
    </footer>
  </body>
</html>
