<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="stylesheet" href="css/conteudo.css" />
    <title>CSS Layout - Semana 06</title>
    <style>
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        overflow: hidden;
        box-shadow: none;
        display: flex;
        flex-direction: column;
      }

      .card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        display: block;
      }

      .card__body {
        padding: 12px 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .card__title {
        margin: 0;
        font-weight: 700;
      }

      .card__link {
        align-self: flex-start;
        text-decoration: none;
        color: #000;
        border: 1px solid #ccc;
        padding: 8px 10px;
        border-radius: 4px;
      }

      .card__link:hover,
      .card__link:focus-visible {
        background: #ddd;
        outline: none;
      }
    </style>
  </head>
  <body id="top">
    <header>
      <object width="100%" height="200px" data="menu.html"></object>
    </header>

    <main id="conteudo">
      <section>
        <h1>Layout com Grid + Responsividade</h1>
        <p>
          Cards responsivos usando <code>grid</code>, <code>gap</code> e imagens
          com <code>object-fit: cover</code>.
        </p>

        <div class="grid" role="list">
          <article class="card" role="listitem">
            <img src="SEJA_RARO.jpg" alt="Evento Seja Raro" loading="lazy" />
            <div class="card__body">
              <p class="card__title">Evento</p>
              <div>Imagem vira um card com link.</div>
              <a class="card__link" href="eventos.html">Ver eventos</a>
            </div>
          </article>

          <article class="card" role="listitem">
            <img src="library.jpeg" alt="Biblioteca" loading="lazy" />
            <div class="card__body">
              <p class="card__title">Biblioteca</p>
              <div>Exemplo de recorte com object-fit.</div>
              <a class="card__link" href="index.html#biblioteca">Ir para Home</a>
            </div>
          </article>

          <article class="card" role="listitem">
            <img src="ifsp.png" alt="IFSP" loading="lazy" />
            <div class="card__body">
              <p class="card__title">Âncoras</p>
              <div>Navegação interna com #id.</div>
              <a class="card__link" href="index.html#suap">Ir para SUAP</a>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <object width="100%" height="200px" data="rodape.html"></object>
    </footer>
  </body>
</html>
