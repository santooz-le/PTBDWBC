<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="stylesheet" href="css/conteudo.css" />
    <link rel="stylesheet" href="css/formularios.css" />
    <title>Contato - IFSP - Pirituba</title>
  </head>
  <body id="top">
    <header>
      <object width="100%" height="84px" data="menu.html"></object>
      <img id="logo-topo" src="ifsp.png" alt="Instituto Federal São Paulo" />
    </header>

    <main id="conteudo">
      <section>
        <h1>Mande uma mensagem</h1>

        <form class="form-card" action="#" method="post">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" required />

          <label for="email">E-Mail</label>
          <input id="email" name="email" type="email" required />

          <label for="tel">Telefone (99) 99999-9999</label>
          <input id="tel" name="tel" type="tel" placeholder="(99) 99999-9999" />

          <label for="assunto">Assunto</label>
          <select id="assunto" name="assunto" required>
            <option value="" selected>-- Selecione --</option>
            <option value="reclamacao">Reclamação</option>
            <option value="sugestao">Sugestão</option>
          </select>

          <label for="msg">Mensagem</label>
          <textarea id="msg" name="msg" rows="5" required></textarea>

          <fieldset style="border: 0; padding: 0; margin: 12px 0 0">
            <legend>Opções de Resposta</legend>
            <label>
              <input type="checkbox" name="resposta" value="email" />
              E-Mail
            </label>
            <label style="margin-left: 12px">
              <input type="checkbox" name="resposta" value="telefone" />
              Telefone
            </label>
          </fieldset>

          <input type="submit" value="Enviar" />
          <input type="reset" value="Limpar" />
        </form>
      </section>
    </main>

    <footer>
      <a class="toTop" href="#top" aria-label="Voltar ao topo">
        <img src="MoveTop.png" alt="" class="toTop__img" />
      </a>
      <object width="100%" height="120px" data="rodape.html"></object>
    </footer>
  </body>
</html>
