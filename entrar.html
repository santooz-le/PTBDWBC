<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="stylesheet" href="css/conteudo.css" />
    <link rel="stylesheet" href="css/formularios.css" />
    <title>Entrar - IFSP - Pirituba</title>
  </head>
  <body id="top">
    <header>
      <object width="100%" height="84px" data="menu.html"></object>
      <img id="logo-topo" src="ifsp.png" alt="Instituto Federal São Paulo" />
    </header>

    <main id="conteudo">
      <section>
        <h1>Entrar</h1>

        <form class="form-card" action="#" method="post">
          <label for="user">Usuário</label>
          <input id="user" name="user" type="text" required />

          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" required />

          <button type="submit">Entrar</button>
          <button type="button" disabled title="Exemplo de :disabled no CSS">
            Esqueci a senha
          </button>
        </form>
      </section>
    </main>

    <footer>
      <object width="100%" height="120px" data="rodape.html"></object>
    </footer>
  </body>
</html>
